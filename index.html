<!doctype html>
<html lang="es-pe">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">
        <header id="header">
            <div>
                <svg id="burger-icon" width="35px" height="35px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g clip-path="url(#clip0_429_11066)"> <path d="M3 6.00092H21M3 12.0009H21M3 18.0009H21" stroke="#292929" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path> </g> <defs> <clipPath id="clip0_429_11066"> <rect width="24" height="24" fill="white" transform="translate(0 0.000915527)"></rect> </clipPath> </defs> </g></svg>
                <h1>Notas</h1>
            </div>
            <div>
                <img src="./images/svg/magnifier.svg" alt="Buscar" width="32px" height="32px">
                <input type="text" id="search-bar" placeholder="Buscar">
            </div>
        </header>
        <div id="container" >
            <sidebar id="options">
                <ul id="options-list">
                    <li id="item-1" class="li-elements"><span id="notes"></span>Notas</li>
                    <li id="item-2" class="li-elements"><span id="edit-labels"></span>Editar Etiquetas</li>
                    <li id="item-3" class="li-elements"><span id="bin"></span>Papelera</li>
                </ul>
            </sidebar>
            <div id="working-area">
                <form id="new-note">
                    <textarea id="title" placeholder="Título"></textarea>
                    <textarea id="content" placeholder="Crear una nota..."></textarea>
                    <button id="delete-data">Del Data</button>
                </form>
                <section class="grid"></section>
            </div>
        </div>
        <div id="modal">
            <div class="modal-content">
                <h2>Borrar todas las Notas?</h2>
                <p>Esta acción eliminará todas las notas.</p>
                <div id="modal-buttons-wrapper">
                    <button type="button" id="ok-delete-data" class="modal-btn">Sí</button>
                    <button type="button" id="no-delete-data" class="modal-btn">No</button>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/muuri@0.9.5/dist/muuri.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
